name: Build All Platforms

on:
  workflow_dispatch:
  push:
    branches: [master, main]

env:
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "501db0f17ef6df18499db82ec480dca42d0b6734"

jobs:
  # ============================================================
  # macOS Universal
  # ============================================================
  build-macos:
    name: macOS Universal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install vcpkg dependencies
        run: |
          git clone --branch 2023.04.15 --depth=1 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          export VCPKG_ROOT="$HOME/vcpkg"
          "$VCPKG_ROOT/vcpkg" install libvpx libyuv opus aom
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Build Rust (Universal)
        run: |
          cargo build --features flutter --lib --release --target aarch64-apple-darwin
          cargo build --features flutter --lib --release --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/liblibrustdesk.dylib \
            target/x86_64-apple-darwin/release/liblibrustdesk.dylib \
            -output target/release/liblibrustdesk.dylib

      - name: Build Flutter macOS
        run: |
          cd flutter && flutter pub get && flutter build macos --release

      - name: Create DMG
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          hdiutil create -volname "RustDesk" \
            -srcfolder flutter/build/macos/Build/Products/Release/rustdesk.app \
            -ov -format UDZO "rustdesk-${VERSION}-universal.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: rustdesk-macos-universal
          path: rustdesk-*.dmg

  # ============================================================
  # Windows x64
  # ============================================================
  build-windows:
    name: Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        run: |
          $env:VCPKG_ROOT = "C:\vcpkg"
          & "$env:VCPKG_ROOT\vcpkg" install libvpx libyuv opus aom `
            --triplet x64-windows-static

      - name: Build RustDesk
        env:
          VCPKG_ROOT: C:\vcpkg
        run: |
          python3 .\build.py --flutter --hwcodec --skip-portable-pack

      - uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: |
            flutter/build/windows/x64/runner/Release/*.msi
            flutter/build/windows/x64/runner/Release/*.exe

  # ============================================================
  # Linux x64
  # ============================================================
  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev libxcb-randr0-dev libxdo-dev libxfixes-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libasound2-dev \
            libpam0g-dev libpulse-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev nasm yasm clang cmake \
            ninja-build pkg-config libssl-dev dpkg-dev

      - name: Install vcpkg dependencies
        run: |
          git clone --branch 2023.04.15 --depth=1 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          "$HOME/vcpkg/vcpkg" install libvpx libyuv opus aom

      - name: Build
        run: |
          cargo build --features flutter --lib --release
          cd flutter && flutter pub get && flutter build linux --release
          cd ..
          python3 build.py --flutter --skip-cargo || true

      - uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-x64
          path: rustdesk-*.deb

  # ============================================================
  # Linux ARM64
  # ============================================================
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev libxcb-randr0-dev libxdo-dev libxfixes-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libasound2-dev \
            libpam0g-dev libpulse-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev nasm yasm clang cmake \
            ninja-build pkg-config libssl-dev dpkg-dev gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: Install vcpkg dependencies
        run: |
          git clone --branch 2023.04.15 --depth=1 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          "$HOME/vcpkg/vcpkg" install libvpx libyuv opus aom

      - name: Build
        env:
          DEB_ARCH: arm64
        run: |
          cargo build --features flutter --lib --release --target aarch64-unknown-linux-gnu
          mkdir -p target/release
          ln -sf ../aarch64-unknown-linux-gnu/release/liblibrustdesk.so target/release/liblibrustdesk.so
          cd flutter && flutter pub get && flutter build linux --release
          cd ..
          python3 build.py --flutter --skip-cargo || true

      - uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-arm64
          path: rustdesk-*.deb
